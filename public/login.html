<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGMA MDX DEPLOY — Connexion</title>
    <style>
        :root {
            --bg: #0a0a0d;
            --panel: #16161c;
            --border: #2a2a34;
            --text: #f4f4f6;
            --muted: #9a9aa8;
            --gold: #f5b301;
            --gold-soft: #ffd257;
            --danger: #ff5c5c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .brand-mark {
            width: 44px; height: 44px; margin: 0 auto 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--gold) 0%, #c98a00 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; color: #0a0a0d;
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; font-weight: 800; }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 30px; font-size: 14px; }
        label { display: block; font-weight: 700; color: var(--text); margin-bottom: 6px; font-size: 13.5px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            margin-bottom: 18px;
            font-size: 15px;
            background: #0d0d10;
            color: var(--text);
            font-family: inherit;
        }
        input::placeholder { color: #55555f; }
        input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 4px rgba(245,179,1,0.12); }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--gold);
            color: #0a0a0d;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s, transform .15s;
        }
        button:hover:not(:disabled) { background: var(--gold-soft); transform: translateY(-1px); }
        button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 18px;
            display: none;
            font-size: 13.5px;
            font-weight: 600;
        }
        .alert.show { display: block; }
        .alert.error { background: rgba(255,92,92,0.12); color: var(--danger); }
        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-mark">Σ</div>
        <h1>Connexion</h1>
        <p class="subtitle">Accède à ton compte SIGMA MDX</p>

        <div class="alert error" id="alert"></div>

        <form id="loginForm">
            <label for="username">Identifiant</label>
            <input type="text" id="username" required autocomplete="username">

            <label for="password">Mot de passe</label>
            <input type="password" id="password" required autocomplete="current-password">

            <button type="submit" id="btnLogin">Se connecter</button>
        </form>

        <p class="hint">Tes identifiants ont été envoyés sur WhatsApp lors du premier appairage de ton bot.</p>
        <a href="/" class="back-link">← Retour à l'accueil</a>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const btn = document.getElementById('btnLogin');

        function showError(message) {
            alertDiv.textContent = message;
            alertDiv.classList.add('show');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertDiv.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Connexion...';

            try {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erreur de connexion');
                }

                window.location.href = '/account.html';
            } catch (error) {
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
