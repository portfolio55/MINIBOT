<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIGMA MDX DEPLOY — admin</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <meta name="theme-color" content="#0a0d0f">
    <style>
        :root {
            --bg: #0a0d0f;
            --panel: #12171a;
            --panel-2: #171d21;
            --border: #232a2e;
            --text: #d9dfe2;
            --muted: #7a8790;
            --accent: #39d353;
            --accent-dim: #26a641;
            --warn: #ffbd2e;
            --danger: #ff5f56;
            --mono: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            --radius: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--mono);
            background: var(--bg);
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--text);
            min-height: 100vh;
            padding: 32px 16px;
        }

        .term {
            max-width: 1180px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .term-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--panel-2);
            border-bottom: 1px solid var(--border);
        }
        .term-dot { width: 10px; height: 10px; border-radius: 50%; }
        .term-dot.r { background: var(--danger); }
        .term-dot.y { background: var(--warn); }
        .term-dot.g { background: var(--accent-dim); }
        .term-title { margin-left: 8px; font-size: 12px; color: var(--muted); }
        .term-body { padding: 28px; overflow-x: hidden; }
        @media (max-width: 480px) { .term-body { padding: 18px 14px; } }

        h1 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 17px;
            font-weight: 700;
        }
        h1::before { content: "Σ "; color: var(--accent); }

        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 26px;
            font-size: 12.5px;
        }

        .auth-form {
            max-width: 380px;
            margin: 0 auto 26px;
            padding: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .auth-form input {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 14px;
            background: var(--panel-2);
            color: var(--text);
            font-family: var(--mono);
        }
        .auth-form input:focus { outline: none; border-color: var(--accent); }

        .auth-form button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #04120a;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            font-family: var(--mono);
            cursor: pointer;
        }
        .auth-form button:hover { background: #4ee566; }

        .admin-panel { display: none; }
        .admin-panel.active { display: block; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 26px;
        }
        @media (max-width: 700px) { .stats { grid-template-columns: repeat(2, 1fr); } }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent-dim);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .stat-value { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .stat-label { font-size: 11.5px; color: var(--muted); }

        .table-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }

        .bots-table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            font-size: 12.5px;
        }

        .bots-table th, .bots-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .bots-table th {
            background: var(--panel-2);
            font-weight: 700;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .bots-table tr:hover { background: var(--panel-2); }

        .status-badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 10.5px;
            border: 1px solid;
        }

        .status-badge.connected { color: var(--accent); border-color: var(--accent-dim); background: rgba(57,211,83,0.08); }
        .status-badge.disconnected { color: var(--danger); border-color: var(--danger); background: rgba(255,95,86,0.08); }
        .status-badge.pairing { color: var(--warn); border-color: var(--warn); background: rgba(255,189,46,0.08); }
        .status-badge.stopped { color: var(--muted); border-color: var(--border); background: var(--panel); }

        .action-buttons { display: flex; gap: 5px; align-items: center; flex-wrap: nowrap; }

        .btn-action {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 700;
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
        }

        .btn-start { border-color: var(--accent-dim); color: var(--accent); }
        .btn-stop { border-color: var(--danger); color: var(--danger); }
        .btn-restart { border-color: var(--warn); color: var(--warn); }
        .btn-delete { border-color: var(--border); color: var(--muted); }

        select {
            font-size: 11px;
            padding: 5px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--mono);
        }

        .alert {
            padding: 12px 13px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: none;
            font-size: 12.5px;
            border: 1px solid;
        }

        .alert.show { display: block; }
        .alert.success { background: rgba(57,211,83,0.08); color: var(--accent); border-color: var(--accent-dim); }
        .alert.error { background: rgba(255,95,86,0.08); color: var(--danger); border-color: var(--danger); }

        .token-cell {
            font-size: 11px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="term">
        <div class="term-bar">
            <span class="term-dot r"></span>
            <span class="term-dot y"></span>
            <span class="term-dot g"></span>
            <span class="term-title">admin.sh</span>
        </div>
        <div class="term-body">
            <h1>sigma-mdx deploy</h1>
            <p class="subtitle">panneau d'administration</p>

            <div class="alert" id="alert"></div>

            <div class="auth-form" id="authForm">
                <input type="password" id="adminPassword" placeholder="mot de passe admin" autocomplete="off">
                <button onclick="authenticate()">se connecter</button>
            </div>

            <div class="admin-panel" id="adminPanel">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalBots">0</div>
                        <div class="stat-label">bots totaux</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="connectedBots">0</div>
                        <div class="stat-label">connectés</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="disconnectedBots">0</div>
                        <div class="stat-label">déconnectés</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="capacityBots">0/100</div>
                        <div class="stat-label">capacité utilisée</div>
                    </div>
                </div>

                <div class="table-scroll">
                    <table class="bots-table">
                        <thead>
                            <tr>
                                <th>uuid</th>
                                <th>numéro</th>
                                <th>token</th>
                                <th>statut</th>
                                <th>abonnement</th>
                                <th>expire le</th>
                                <th>créé le</th>
                                <th>actions</th>
                            </tr>
                        </thead>
                        <tbody id="botsTableBody">
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 40px; color: var(--muted);">
                                    chargement...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = null;

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type} show`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        async function authenticate() {
            const password = document.getElementById('adminPassword').value;

            if (!password) {
                showAlert('veuillez entrer le mot de passe', 'error');
                return;
            }

            adminPassword = password;
            await loadBots();
        }

        async function loadBots() {
            try {
                const response = await fetch('/api/admin/bots', {
                    headers: {
                        'Authorization': 'Bearer ' + adminPassword
                    }
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'erreur lors du chargement');
                }

                document.getElementById('authForm').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');

                const total = data.bots.length;
                const connected = data.bots.filter(b => b.socketStatus === 'connected').length;
                const disconnected = total - connected;

                document.getElementById('totalBots').textContent = total;
                document.getElementById('connectedBots').textContent = connected;
                document.getElementById('disconnectedBots').textContent = disconnected;

                if (data.capacity) {
                    const cap = data.capacity;
                    document.getElementById('capacityBots').textContent = `${cap.active}/${cap.max}`;
                    const pct = Math.round((cap.active / cap.max) * 100);
                    const capCard = document.getElementById('capacityBots').parentElement;
                    capCard.style.borderTopColor = pct >= 90 ? '#ff5f56' : pct >= 70 ? '#ffbd2e' : '#26a641';
                }

                const tbody = document.getElementById('botsTableBody');
                tbody.innerHTML = '';

                if (data.bots.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--muted);">aucun bot déployé</td></tr>';
                    return;
                }

                const PLAN_LABELS = { trial: 'essai', '2days': '2 jours', week: '1 semaine', month: '1 mois' };

                data.bots.forEach(bot => {
                    const row = document.createElement('tr');
                    const createdAt = new Date(bot.createdAt).toLocaleString('fr-FR');
                    const status = bot.socketStatus || bot.status || 'unknown';
                    const plan = bot.subscriptionPlan ? (PLAN_LABELS[bot.subscriptionPlan] || bot.subscriptionPlan) : '-';
                    const expiresAt = bot.subscriptionExpiresAt ? new Date(bot.subscriptionExpiresAt) : null;
                    const expiresLabel = expiresAt ? expiresAt.toLocaleString('fr-FR') : '-';
                    const expiresColor = expiresAt && expiresAt < new Date() ? 'color: #ff5f56; font-weight: 700;' : '';

                    row.innerHTML = `
                        <td style="font-size: 11px; color: var(--muted);">${bot.uuid.substring(0, 8)}...</td>
                        <td>${bot.phoneNumber || '-'}</td>
                        <td class="token-cell" title="${bot.token}">${bot.token.substring(0, 20)}...</td>
                        <td><span class="status-badge ${status}">${status}</span></td>
                        <td>${plan}</td>
                        <td style="${expiresColor}">${expiresLabel}</td>
                        <td>${createdAt}</td>
                        <td class="action-buttons">
                            <button class="btn-action btn-start" onclick="adminAction('${bot.uuid}', 'start')">start</button>
                            <button class="btn-action btn-stop" onclick="adminAction('${bot.uuid}', 'stop')">stop</button>
                            <button class="btn-action btn-restart" onclick="adminAction('${bot.uuid}', 'restart')">restart</button>
                            <button class="btn-action btn-delete" onclick="adminAction('${bot.uuid}', 'delete')">delete</button>
                            <select id="plan-${bot.uuid}">
                                <option value="2days">2j/500F</option>
                                <option value="week">7j/1000F</option>
                                <option value="month">30j/3000F</option>
                            </select>
                            <button class="btn-action btn-start" onclick="extendSubscription('${bot.uuid}')">+ajouter</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                showAlert(`erreur : ${error.message}`, 'error');
                if (error.message.includes('non autorisé')) {
                    adminPassword = null;
                    document.getElementById('adminPassword').value = '';
                }
            }
        }

        async function adminAction(uuid, action) {
            if (!adminPassword) {
                showAlert('veuillez vous authentifier', 'error');
                return;
            }

            if (action === 'delete' && !confirm(`êtes-vous sûr de vouloir supprimer le bot ${uuid.substring(0, 8)}... ?`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/bot/${uuid}/${action}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + adminPassword
                    },
                    body: JSON.stringify({})
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "erreur lors de l'action");
                }

                showAlert(`action ${action} exécutée avec succès`, 'success');
                await loadBots();
            } catch (error) {
                showAlert(`erreur : ${error.message}`, 'error');
            }
        }

        async function extendSubscription(uuid) {
            if (!adminPassword) {
                showAlert('veuillez vous authentifier', 'error');
                return;
            }

            const select = document.getElementById(`plan-${uuid}`);
            const plan = select ? select.value : '2days';

            try {
                const response = await fetch(`/api/admin/bot/${uuid}/extend-subscription`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + adminPassword
                    },
                    body: JSON.stringify({ plan })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'erreur lors de la prolongation');
                }

                showAlert('abonnement prolongé avec succès', 'success');
                await loadBots();
            } catch (error) {
                showAlert(`erreur : ${error.message}`, 'error');
            }
        }

        setInterval(() => {
            if (adminPassword) {
                loadBots();
            }
        }, 30000);
    </script>
</body>
</html>
