<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIGMA MDX DEPLOY — mon compte</title>
    <style>
        :root {
            --bg: #0a0d0f;
            --panel: #12171a;
            --panel-2: #171d21;
            --border: #232a2e;
            --text: #d9dfe2;
            --muted: #7a8790;
            --accent: #39d353;
            --accent-dim: #26a641;
            --warn: #ffbd2e;
            --danger: #ff5f56;
            --mono: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', Consolas, 'Courier New', monospace;
            --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--mono);
            background: var(--bg);
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 28px 28px;
            color: var(--text);
            min-height: 100vh;
            padding: 32px 16px;
        }
        .term {
            max-width: 640px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .term-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--panel-2);
            border-bottom: 1px solid var(--border);
        }
        .term-dot { width: 10px; height: 10px; border-radius: 50%; }
        .term-dot.r { background: var(--danger); }
        .term-dot.y { background: var(--warn); }
        .term-dot.g { background: var(--accent-dim); }
        .term-title { margin-left: 8px; font-size: 12px; color: var(--muted); }
        .term-body { padding: 28px; }
        @media (max-width: 480px) { .term-body { padding: 20px 16px; } }

        .brand-mark {
            width: 40px; height: 40px; margin: 0 auto 16px;
            border-radius: 6px;
            background: var(--panel-2);
            border: 1px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 19px; font-weight: 700; color: var(--accent);
        }
        h1 { text-align: center; margin-bottom: 6px; font-size: 18px; font-weight: 700; }
        h2.section-title { margin-bottom: 14px; font-size: 13px; font-weight: 400; color: var(--muted); }
        h2.section-title::before { content: "// "; color: var(--accent); }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 26px; font-size: 12.5px; }
        .info-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 26px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 13px;
            padding-bottom: 13px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            flex-wrap: wrap;
        }
        .info-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .info-label { color: var(--muted); }
        .info-value { color: var(--text); word-break: break-all; }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid;
        }
        .status-badge.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(57,211,83,0.08); }
        .status-badge.expiring { color: var(--warn); border-color: var(--warn); background: rgba(255,189,46,0.08); }
        .status-badge.expired { color: var(--danger); border-color: var(--danger); background: rgba(255,95,86,0.08); }
        .plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .plan-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            background: var(--bg);
        }
        .plan-card h3 { font-size: 13px; color: var(--text); margin-bottom: 6px; font-weight: 700; }
        .plan-card .price { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
        .plan-card button {
            width: 100%;
            padding: 9px;
            border: none;
            border-radius: 4px;
            background: var(--accent);
            color: #04120a;
            font-weight: 700;
            font-family: var(--mono);
            cursor: pointer;
            transition: background .15s;
        }
        .plan-card button:hover:not(:disabled) { background: #4ee566; }
        .plan-card button:disabled { opacity: 0.5; cursor: not-allowed; }
        .alert {
            padding: 12px 13px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            display: none;
            font-size: 12.5px;
            border: 1px solid;
        }
        .alert.show { display: block; }
        .alert.success { background: rgba(57,211,83,0.08); color: var(--accent); border-color: var(--accent-dim); }
        .alert.error { background: rgba(255,95,86,0.08); color: var(--danger); border-color: var(--danger); }
        .link-bar { text-align: center; margin-top: 18px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .link-bar a { color: var(--muted); font-size: 12px; text-decoration: none; }
        .link-bar a:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="term">
        <div class="term-bar">
            <span class="term-dot r"></span>
            <span class="term-dot y"></span>
            <span class="term-dot g"></span>
            <span class="term-title">account.sh</span>
        </div>
        <div class="term-body">
            <div class="brand-mark">Σ</div>
            <h1>mon compte</h1>
            <p class="subtitle">gère ton abonnement sigma-mdx</p>

            <div class="alert" id="alert"></div>

            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">identifiant</span>
                    <span class="info-value" id="username">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">numéro</span>
                    <span class="info-value" id="phoneNumber">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">statut du bot</span>
                    <span class="status-badge" id="botStatus">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">plan actuel</span>
                    <span class="info-value" id="planName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">expire le</span>
                    <span class="info-value" id="expiresAt">-</span>
                </div>
            </div>

            <h2 class="section-title">renouveler mon abonnement</h2>
            <div class="plans" id="plansContainer"></div>

            <div class="link-bar">
                <a href="#" id="dashboardLink">gérer mon bot →</a>
                <a href="#" id="logoutLink">déconnexion</a>
            </div>
        </div>
    </div>

    <script>
        const alertDiv = document.getElementById('alert');
        let currentAccount = null;

        const PLAN_LABELS = {
            trial: 'Essai gratuit',
            '2days': '2 jours',
            week: '1 semaine',
            month: '1 mois'
        };

        const PLAN_PRICES = {
            '2days': 500,
            week: 1000,
            month: 3000
        };

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type} show`;
        }

        function renderPlans() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = '';
            for (const [key, price] of Object.entries(PLAN_PRICES)) {
                const card = document.createElement('div');
                card.className = 'plan-card';
                card.innerHTML = `
                    <h3>${PLAN_LABELS[key]}</h3>
                    <div class="price">${price} FCFA</div>
                    <button data-plan="${key}">payer</button>
                `;
                container.appendChild(card);
            }
            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => payPlan(btn.dataset.plan, btn));
            });
        }

        async function payPlan(plan, btn) {
            btn.disabled = true;
            btn.textContent = 'redirection...';
            try {
                const response = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plan })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'erreur de paiement');
                window.location.href = data.url;
            } catch (error) {
                showAlert(`erreur : ${error.message}`, 'error');
                btn.disabled = false;
                btn.textContent = 'payer';
            }
        }

        async function loadAccount() {
            try {
                const response = await fetch('/api/account/me');
                const data = await response.json();

                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }

                currentAccount = data.account;
                document.getElementById('username').textContent = currentAccount.username || '-';
                document.getElementById('phoneNumber').textContent = currentAccount.phoneNumber || '-';
                document.getElementById('planName').textContent = PLAN_LABELS[currentAccount.subscriptionPlan] || currentAccount.subscriptionPlan || '-';

                const statusBadge = document.getElementById('botStatus');
                statusBadge.textContent = currentAccount.status;
                statusBadge.className = `status-badge ${currentAccount.status === 'connected' ? 'active' : currentAccount.status === 'expired' ? 'expired' : 'expiring'}`;

                const expiresEl = document.getElementById('expiresAt');
                if (currentAccount.subscriptionExpiresAt) {
                    const expires = new Date(currentAccount.subscriptionExpiresAt);
                    expiresEl.textContent = expires.toLocaleString('fr-FR');
                    if (expires < new Date()) {
                        expiresEl.style.color = '#ff5f56';
                    }
                } else {
                    expiresEl.textContent = '-';
                }

                document.getElementById('dashboardLink').href = `/dashboard/${currentAccount.token}`;

                const params = new URLSearchParams(window.location.search);
                if (params.get('payment') === 'processed') {
                    showAlert('paiement en cours de traitement. ton abonnement sera mis à jour sous quelques instants.', 'success');
                }
            } catch (error) {
                showAlert(`erreur : ${error.message}`, 'error');
            }
        }

        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        });

        renderPlans();
        loadAccount();
        setInterval(loadAccount, 15000);
    </script>
</body>
</html>
